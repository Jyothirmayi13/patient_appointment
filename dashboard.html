<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Appointment System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 5px;
      font-size: 28px;
    }

    p.subtitle {
      text-align: center;
      color: #7f8c8d;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .status-bar {
      text-align: center;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-green { background: #27ae60; }
    .dot-red   { background: #e74c3c; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .top-bar input, .top-bar select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .top-bar button {
      padding: 8px 16px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .top-bar button:hover { background-color: #2980b9; }

    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px 25px;
      text-align: center;
      flex: 1;
      min-width: 120px;
    }

    .stat-box h3 { margin: 0; font-size: 28px; color: #2c3e50; }
    .stat-box p  { margin: 5px 0 0; font-size: 13px; color: #7f8c8d; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    th {
      background-color: #3498db;
      color: white;
      padding: 12px 15px;
      text-align: left;
      font-size: 14px;
    }

    td {
      padding: 11px 15px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      color: #2c3e50;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: #eaf4fb; }

    .priority-high   { color: #e74c3c; font-weight: bold; }
    .priority-medium { color: #f39c12; font-weight: bold; }
    .priority-low    { color: #27ae60; font-weight: bold; }

    .empty-msg {
      text-align: center;
      padding: 30px;
      color: #aaa;
      font-size: 14px;
    }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 99;
    }
    .modal-bg.show { display: flex; }

    .modal {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 380px;
    }
    .modal h2 { margin-top: 0; color: #2c3e50; font-size: 18px; }
    .modal label { display: block; margin-top: 12px; font-size: 13px; color: #555; }
    .modal input, .modal select {
      width: 100%; padding: 8px; margin-top: 4px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 14px;
    }

    .modal-buttons {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-buttons button {
      padding: 8px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-cancel { background: #ecf0f1; color: #333; }
    .btn-add    { background: #3498db; color: white; }
    .btn-add:hover { background: #2980b9; }

    .del-btn {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }
    .del-btn:hover { text-decoration: underline; }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #2c3e50;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <h1>Patient Appointment System</h1>
  <p class="subtitle">AVL Tree Based Scheduling — Live Dashboard</p>

  <!-- Server status indicator -->
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting to C server...</span>
  </div>

  <div class="top-bar">
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <input type="text" id="searchBox" placeholder="Search by name or doctor..." oninput="render()" style="width:220px;">
      <select id="filterPriority" onchange="render()">
        <option value="">All Priorities</option>
        <option value="1">High</option>
        <option value="2">Medium</option>
        <option value="3">Low</option>
      </select>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button onclick="fetchAppointments()" style="background:#7f8c8d;">↻ Refresh</button>
      <button onclick="document.getElementById('modal').classList.add('show')" style="background:#27ae60;">+ Add</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <h3 id="s-total">0</h3><p>Total</p>
    </div>
    <div class="stat-box">
      <h3 id="s-high" style="color:#e74c3c;">0</h3><p>High Priority</p>
    </div>
    <div class="stat-box">
      <h3 id="s-medium" style="color:#f39c12;">0</h3><p>Medium Priority</p>
    </div>
    <div class="stat-box">
      <h3 id="s-low" style="color:#27ae60;">0</h3><p>Low Priority</p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Patient Name</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time Slot</th>
        <th>Priority</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr>
        <td colspan="7" class="empty-msg">Waiting for server...</td>
      </tr>
    </tbody>
  </table>

  <!-- Add Appointment Modal -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>Add Appointment</h2>

      <label>ID</label>
      <input type="number" id="f-id" placeholder="e.g. 101">

      <label>Patient Name</label>
      <input type="text" id="f-name" placeholder="e.g. Ravi Kumar">

      <label>Doctor Name</label>
      <input type="text" id="f-doc" placeholder="e.g. Dr. Sharma">

      <label>Date (DD-MM-YYYY)</label>
      <input type="text" id="f-date" placeholder="e.g. 15-06-2025">

      <label>Time Slot</label>
      <input type="text" id="f-slot" placeholder="e.g. 10:00AM">

      <label>Priority</label>
      <select id="f-priority">
        <option value="1">1 - High</option>
        <option value="2">2 - Medium</option>
        <option value="3">3 - Low</option>
      </select>

      <div class="modal-buttons">
        <button class="btn-cancel" onclick="document.getElementById('modal').classList.remove('show')">Cancel</button>
        <button class="btn-add" onclick="addAppointment()">Add</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

<script>
  var API = 'http://localhost:8080';
  var appointments = [];

  /* ── Toast ── */
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  /* ── Server status ── */
  function setStatus(online) {
    var dot  = document.getElementById('statusDot');
    var text = document.getElementById('statusText');
    if (online) {
      dot.className  = 'status-dot dot-green';
      text.textContent = 'C Server connected — live data';
      text.style.color = '#27ae60';
    } else {
      dot.className  = 'status-dot dot-red';
      text.textContent = 'C Server offline — run: gcc server.c avl.c queue.c -o server && ./server';
      text.style.color = '#e74c3c';
    }
  }

  /* ── Fetch all appointments from C server ── */
  function fetchAppointments() {
    fetch(API + '/appointments')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        appointments = data;
        setStatus(true);
        render();
      })
      .catch(function() {
        setStatus(false);
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="7" class="empty-msg">Cannot reach C server. Make sure it\'s running.</td></tr>';
      });
  }

  /* ── Add appointment → POST to C server ── */
  function addAppointment() {
    var id       = parseInt(document.getElementById('f-id').value);
    var name     = document.getElementById('f-name').value.trim();
    var doc      = document.getElementById('f-doc').value.trim();
    var date     = document.getElementById('f-date').value.trim();
    var slot     = document.getElementById('f-slot').value.trim();
    var priority = parseInt(document.getElementById('f-priority').value);

    if (!id || !name || !doc || !date || !slot) {
      alert('Please fill in all fields.');
      return;
    }

    var body = id + ',' + name + ',' + doc + ',' + date + ',' + slot + ',' + priority;

    fetch(API + '/appointments', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: body
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        alert(data.error);
      } else {
        document.getElementById('modal').classList.remove('show');
        clearForm();
        fetchAppointments();
        showToast('Appointment added & saved by C server ✓');
      }
    })
    .catch(function() { alert('Server error. Is the C server running?'); });
  }

  /* ── Delete appointment → DELETE to C server ── */
  function deleteAppt(id) {
    if (!confirm('Delete appointment ID ' + id + '?')) return;

    fetch(API + '/appointments/' + id, { method: 'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          alert(data.error);
        } else {
          fetchAppointments();
          showToast('Appointment deleted & saved by C server ✓');
        }
      })
      .catch(function() { alert('Server error.'); });
  }

  /* ── Render table ── */
  function render() {
    var search = document.getElementById('searchBox').value.toLowerCase();
    var filter = document.getElementById('filterPriority').value;

    var data = appointments.filter(function(a) {
      var matchSearch   = a.name.toLowerCase().indexOf(search) >= 0 ||
                          a.doctor.toLowerCase().indexOf(search) >= 0;
      var matchPriority = filter === '' || String(a.priority) === filter;
      return matchSearch && matchPriority;
    });

    document.getElementById('s-total').textContent  = appointments.length;
    document.getElementById('s-high').textContent   = appointments.filter(function(a){ return a.priority == 1; }).length;
    document.getElementById('s-medium').textContent = appointments.filter(function(a){ return a.priority == 2; }).length;
    document.getElementById('s-low').textContent    = appointments.filter(function(a){ return a.priority == 3; }).length;

    var tbody = document.getElementById('tableBody');

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No appointments found.</td></tr>';
      return;
    }

    var html = '';
    for (var i = 0; i < data.length; i++) {
      var a = data[i];
      var pText  = a.priority == 1 ? 'High' : (a.priority == 2 ? 'Medium' : 'Low');
      var pClass = a.priority == 1 ? 'priority-high' : (a.priority == 2 ? 'priority-medium' : 'priority-low');
      html += '<tr>';
      html += '<td>' + a.id + '</td>';
      html += '<td>' + a.name + '</td>';
      html += '<td>' + a.doctor + '</td>';
      html += '<td>' + a.date + '</td>';
      html += '<td>' + a.slot + '</td>';
      html += '<td class="' + pClass + '">' + pText + '</td>';
      html += '<td><button class="del-btn" onclick="deleteAppt(' + a.id + ')">Delete</button></td>';
      html += '</tr>';
    }
    tbody.innerHTML = html;
  }

  function clearForm() {
    ['f-id','f-name','f-doc','f-date','f-slot'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
  }

  /* ── Auto-refresh every 5 seconds ── */
  fetchAppointments();
  setInterval(fetchAppointments, 5000);
</script>

</body>
</html>
